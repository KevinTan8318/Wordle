<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wordy</title>

    <link rel="stylesheet" href="style.css" />
    <script type="module" src="index.js" defer></script>
  </head>

  <body>
    <div id="StartMenu">
      <div class="menu-section">
        <img src="Images/icon.png" alt="Your Company" class="logo" />

        <h2 class="title">Get a specific amount of chances to guess a word.</h2>
      </div>

      <div class="menu-section">
        <button class="menu-button rose-button" type="button">Modes</button>

        <button
          id="Start-Round"
          type="button"
          class="menu-button indigo-button"
        >
          Play
        </button>
      </div>
    </div>

    <div id="game">
      <div class="grid"></div>
    </div>
  </body>
</html>
